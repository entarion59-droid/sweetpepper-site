<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Sweet Pepper Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #0d0d0d; color: #e8e0d5; font-family: 'Raleway', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: #161616; border: 1px solid rgba(255,255,255,0.07); padding: 3rem 2.5rem; width: 100%; max-width: 380px; text-align: center; }
.login-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
.login-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.25rem; }
.login-sub { font-size: 0.75rem; color: #8a8078; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2.5rem; }
input { width: 100%; background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1); color: #e8e0d5; padding: 0.85rem 1rem; font-family: 'Raleway', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 1rem; transition: border-color 0.2s; }
input:focus { border-color: #c0392b; }
button { width: 100%; background: #c0392b; color: white; border: none; padding: 0.85rem; font-family: 'Raleway', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: background 0.2s; }
button:hover { background: #e74c3c; }
.error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; padding: 0.75rem; margin-bottom: 1rem; font-size: 0.82rem; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">🌶</div>
  <h1 class="login-title">Sweet Pepper</h1>
  <p class="login-sub">Панель управления</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Введите пароль" autofocus>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
